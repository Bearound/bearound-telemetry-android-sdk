name: Publish SDK and Create TAG and Release

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  auto-tag-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Read SDK version from gradle.properties
        id: version
        run: |
          version=$(grep SDK_VERSION gradle.properties | cut -d'=' -f2 | tr -d '[:space:]')
          echo "sdk_version=$version" >> $GITHUB_OUTPUT

      - name: Replace SDK version in README badge
        run: |
          sdk_version="${{ steps.version.outputs.sdk_version }}"
          branch="$(echo "${GITHUB_REF}" | sed 's|refs/heads/||')"

          echo "Replacing any vX.Y.Z with v$sdk_version in README.md"
          sed -i.bak -E "s/v[0-9]+\.[0-9]+\.[0-9]+/v$sdk_version/g" README.md
          rm README.md.bak

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "README.md is already updated. Nothing to commit."
          else
            git add README.md
            git commit -m "Update SDK version badge to v$sdk_version"
            git push origin "$branch"
          fi

      - name: Check if tag already exists
        run: |
          tag="v${{ steps.version.outputs.sdk_version }}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists. Bump SDK_VERSION in gradle.properties first."
            exit 1
          else
            echo "Tag $tag does not exist yet. Continuing..."
          fi

      - name: Create and push Git tag
        run: |
          tag="v${{ steps.version.outputs.sdk_version }}"
          echo "Creating and pushing tag: $tag"
          git tag "$tag"
          git push origin "$tag"

      - name: Publish to GitHub Packages
        run: ./gradlew :sdk:publishReleasePublicationToGitHubPackagesRepository
        env:
          GPR_USER: ${{ github.actor }}
          GPR_KEY: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger JitPack build
        run: |
          tag="v${{ steps.version.outputs.sdk_version }}"

          echo "Requesting JitPack build for tag $tag (public repo — a lookup triggers the build)..."
          curl -s -o /dev/null -w "HTTP %{http_code}\n" --max-time 300 \
            "https://jitpack.io/com/github/Bearound/bearound-telemetry-android-sdk/$tag/build.log" || true
          echo "JitPack build queued. Status: https://jitpack.io/#Bearound/bearound-telemetry-android-sdk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.sdk_version }}
          name: Release v${{ steps.version.outputs.sdk_version }}
          body: |
            New SDK version published automatically 🎉
            - Version: `${{ steps.version.outputs.sdk_version }}`
            - JitPack: `implementation 'com.github.Bearound:bearound-telemetry-android-sdk:v${{ steps.version.outputs.sdk_version }}'`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
