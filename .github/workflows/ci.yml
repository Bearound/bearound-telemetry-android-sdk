name: CI

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
      - 'fix/**'
  pull_request:
    branches:
      - main
      - develop

jobs:
  validate:
    name: Validate Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: false

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Validate Gradle wrapper
        uses: gradle/wrapper-validation-action@v2

      - name: Run lint
        run: ./gradlew :sdk:lint

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: sdk/build/reports/lint-results*.html
          retention-days: 7

  build:
    name: Build SDK
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [validate]

    strategy:
      matrix:
        build-type: [debug, release]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: false

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build ${{ matrix.build-type }} AAR
        run: ./gradlew :sdk:assemble${{ matrix.build-type == 'debug' && 'Debug' || 'Release' }}

      - name: Verify AAR was created
        run: |
          BUILD_TYPE="${{ matrix.build-type }}"
          AAR_FILE="sdk/build/outputs/aar/sdk-${BUILD_TYPE}.aar"

          if [ ! -f "$AAR_FILE" ]; then
            echo "❌ ${BUILD_TYPE} AAR not found at $AAR_FILE"
            exit 1
          fi

          echo "✅ ${BUILD_TYPE} AAR created successfully"
          ls -lh "$AAR_FILE"

      - name: Upload AAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdk-aar-${{ matrix.build-type }}
          path: sdk/build/outputs/aar/sdk-${{ matrix.build-type }}.aar
          retention-days: 7

  build-example-app:
    name: Build Example App
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: false

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build example app APK
        run: ./gradlew :example:assembleDebug

      - name: Verify APK was created
        run: |
          APK_FILE=$(find example/build/outputs/apk/debug -name "*.apk" | head -n 1)

          if [ -z "$APK_FILE" ]; then
            echo "❌ Example app APK not found"
            exit 1
          fi

          echo "✅ Example app APK created successfully"
          ls -lh "$APK_FILE"

      - name: Upload example APK
        uses: actions/upload-artifact@v4
        with:
          name: example-app-apk
          path: example/build/outputs/apk/debug/*.apk
          retention-days: 7

  jitpack-simulation:
    name: JitPack Build Simulation
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [validate]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: false

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Simulate JitPack build
        run: |
          echo "🔨 Simulating JitPack build process (mirrors jitpack.yml)..."
          sed -i "s/include ':sdk', ':example'/include ':sdk'/" settings.gradle
          ./gradlew :sdk:clean :sdk:assemble :sdk:publishToMavenLocal -Pgroup=com.github.Bearound -xtest -xlint --no-daemon
          echo "✅ JitPack simulation completed successfully"

      - name: Verify Maven artifacts
        run: |
          SDK_VERSION=$(grep SDK_VERSION gradle.properties | cut -d'=' -f2 | tr -d '[:space:]')
          MAVEN_PATH="$HOME/.m2/repository/com/github/Bearound/bearound-telemetry-android-sdk/$SDK_VERSION"

          if [ ! -d "$MAVEN_PATH" ]; then
            echo "❌ Maven artifacts not found at $MAVEN_PATH"
            ls -la "$HOME/.m2/repository/com/github/Bearound/" || echo "Repository not found"
            exit 1
          fi

          echo "✅ Maven artifacts published successfully"
          ls -lh "$MAVEN_PATH"

          REQUIRED_FILES=("bearound-telemetry-android-sdk-$SDK_VERSION.aar" "bearound-telemetry-android-sdk-$SDK_VERSION.pom")
          for file in "${REQUIRED_FILES[@]}"; do
            if [ -f "$MAVEN_PATH/$file" ]; then
              echo "✅ Found: $file"
            else
              echo "❌ Missing: $file"
              exit 1
            fi
          done

  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [validate, build, build-example-app, jitpack-simulation]
    if: always()

    steps:
      - name: Check CI status
        run: |
          if [ "${{ needs.validate.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ] || \
             [ "${{ needs.build-example-app.result }}" != "success" ] || \
             [ "${{ needs.jitpack-simulation.result }}" != "success" ]; then
            echo "❌ CI failed"
            exit 1
          fi

          echo "✅ All CI checks passed successfully!"
